<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Failsafe — HOD Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 2rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    h1 { font-size: 2rem; }

    .back-link {
      font-size: 13px;
      color: #ff5032;
      text-decoration: none;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
    }

    .stat-num {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ff5032;
    }

    .stat-label {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .section {
      background: white;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .section h2 {
      font-size: 16px;
      margin-bottom: 1.5rem;
      color: #111;
    }

    .chart-container {
      position: relative;
      height: 300px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      padding: 10px 12px;
      background: #f5f5f5;
      color: #666;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 10px 12px;
      border-top: 1px solid #eee;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
      background: #fff0ee;
      color: #ff5032;
    }

    .no-data {
      text-align: center;
      padding: 3rem;
      color: #999;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>⚠️ HOD Dashboard</h1>
    <a class="back-link" href="index.html">← Back to Faculty View</a>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="total">—</div>
      <div class="stat-label">Total Students</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="at-risk">—</div>
      <div class="stat-label">Flagged At Risk</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="percentage">—</div>
      <div class="stat-label">Risk Percentage</div>
    </div>
  </div>

  <div class="section">
    <h2>Top Risk Factors</h2>
    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="section">
    <h2>At-Risk Students</h2>
    <div id="table-container"></div>
  </div>

  <script>
    const students = JSON.parse(localStorage.getItem("failsafe_results") || "[]");

    if (students.length === 0) {
      document.getElementById("table-container").innerHTML = `
        <div class="no-data">No data yet — upload a CSV on the <a href="index.html" style="color:#ff5032">faculty page</a> first.</div>
      `;
    } else {
      const atRisk = students.filter(s => s.at_risk);
      const total = students.length;

      document.getElementById("total").textContent = total;
      document.getElementById("at-risk").textContent = atRisk.length;
      document.getElementById("percentage").textContent = Math.round((atRisk.length / total) * 100) + "%";

      // Count risk factors
      const factorCounts = {};
      atRisk.forEach(s => {
        s.top_factors.forEach(f => {
          if (f.impact > 0) {
            factorCounts[f.factor] = (factorCounts[f.factor] || 0) + 1;
          }
        });
      });

      const sorted = Object.entries(factorCounts).sort((a, b) => b[1] - a[1]);
      const labels = sorted.map(e => e[0]);
      const counts = sorted.map(e => e[1]);

      new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "Students affected",
            data: counts,
            backgroundColor: "#ff5032",
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { stepSize: 1 } }
          }
        }
      });

      // Table
      const tableHTML = `
        <table>
          <thead>
            <tr>
              <th>Student</th>
              <th>Status</th>
              <th>Top Risk Factor</th>
              <th>Impact Score</th>
            </tr>
          </thead>
          <tbody>
            ${atRisk.map(s => {
              const top = s.top_factors.find(f => f.impact > 0) || s.top_factors[0];
              return `
                <tr>
                  <td>Student ${s.student_index}</td>
                  <td><span class="badge">⚠ At Risk</span></td>
                  <td>${top ? top.factor : "—"}</td>
                  <td>${top ? top.impact : "—"}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;

      document.getElementById("table-container").innerHTML = tableHTML;
    }
  </script>

</body>
</html>
