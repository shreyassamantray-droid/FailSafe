<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FailSafe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      color: #111;
      padding: 2rem;
    }

    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    p.subtitle { color: #666; margin-bottom: 2rem; }

    .upload-box {
      background: white;
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 2rem;
      text-align: center;
      margin-bottom: 2rem;
      cursor: pointer;
    }

    .upload-box:hover { border-color: #ff5032; }

    input[type="file"] { display: none; }

    button {
      background: #ff5032;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 15px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 1rem;
    }

    button:hover { opacity: 0.85; }

    #status { color: #666; margin: 1rem 0; font-size: 14px; }

    .results { display: grid; gap: 1rem; }

    .card {
      background: white;
      border-radius: 8px;
      padding: 1.25rem;
      border-left: 4px solid #ccc;
    }

    .card.at-risk { border-left-color: #ff5032; }
    .card.safe { border-left-color: #22c55e; }

    .card h3 { margin-bottom: 0.5rem; font-size: 15px; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .intervention {
      margin-top: 10px;
      font-size: 13px;
      color: #333;
      background: #fff8f7;
      border: 1px solid #ffe0da;
      border-radius: 6px;
      padding: 8px 12px;
    }

    .intervene-btn {
      margin-top: 10px;
      background: white;
      color: #ff5032;
      border: 1px solid #ff5032;
      padding: 6px 16px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .intervene-btn:hover { background: #fff0ee; }

    .badge.risk { background: #fff0ee; color: #ff5032; }
    .badge.safe { background: #f0fdf4; color: #22c55e; }

    .factors { font-size: 13px; color: #555; }
    .factors span { display: block; margin-top: 4px; }
  </style>
</head>
<body>

  <h1>⚠️ FailSafe</h1>
  <p class="subtitle">Upload student data to identify at-risk students</p>
  <a href="dashboard.html" style="font-size: 13px; color: #ff5032;">View HOD Dashboard →</a>

  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    <p>Click to upload a student CSV file</p>
    <input type="file" id="fileInput" accept=".csv" onchange="handleFile(event)">
  </div>

  <div id="status"></div>
  <div class="results" id="results"></div>

  <script>
    async function handleFile(event) {
      const file = event.target.files[0];
      if (!file) return;

      const status = document.getElementById("status");
      const results = document.getElementById("results");

      status.textContent = "Analysing students...";
      results.innerHTML = "";

      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch("http://127.0.0.1:8000/predict", {
          method: "POST",
          body: formData
        });

        const data = await response.json();
        const students = data.results;
        localStorage.setItem("failsafe_results", JSON.stringify(students));
        window.studentData = {};

        const atRisk = students.filter(s => s.at_risk).length;
        status.textContent = `${students.length} students analysed — ${atRisk} flagged at risk`;

        students.forEach(student => {
          const card = document.createElement("div");
          card.className = `card ${student.at_risk ? "at-risk" : "safe"}`;

          const factors = student.top_factors.map(f => {
            const direction = f.impact > 0 ? "↑ pushing towards risk" : "↓ reducing risk";
            return `<span>• ${f.factor}: ${direction}</span>`;
          }).join("");

          window.studentData[student.student_index] = {
            row_data: student.row_data,
            top_factors: student.top_factors
          };

          card.innerHTML = `
              <h3>Student ${student.student_index}</h3>
              <span class="badge ${student.at_risk ? "risk" : "safe"}">
                ${student.at_risk ? "⚠ At Risk" : "✓ On Track"}
              </span>
              <div class="factors">${factors}</div>
              ${student.at_risk ? `
                  <button class="intervene-btn" id="btn-${student.student_index}" onclick="getIntervention(${student.student_index})">
                  📋 Generate Intervention
                  </button>
                  <div class="intervention" id="intervention-${student.student_index}"></div>
              ` : ""}
            `;

          results.appendChild(card);
        });

      } catch (err) {
        status.textContent = "Error connecting to backend. Is it running?";
      }
    }

    async function getIntervention(studentIndex) {
    const riskFactors = window.studentData[studentIndex].top_factors;
    const studentData = window.studentData[studentIndex].row_data;
    
    const btn = document.getElementById(`btn-${studentIndex}`);
    const box = document.getElementById(`intervention-${studentIndex}`);

    btn.textContent = "Generating...";
    btn.disabled = true;

    try {
        const response = await fetch("http://127.0.0.1:8000/intervene", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                student_data: studentData,
                risk_factors: riskFactors
            })
        });

        const data = await response.json();
        box.textContent = "📋 " + data.intervention;
        btn.style.display = "none";

    } catch (err) {
        btn.textContent = "Failed, try again";
        btn.disabled = false;
        }
    }
  </script>

</body>
</html>
